      - name: Custom Connectors
      - name: Advanced Integrations
      - name: AI Agents (Kaily.ai)
      - name: Boltic Gateway API
      - name: Boltic Workflow API
      - name: Boltic Tables API
      - name: Boltic Pipes API
      - name: Boltic Streams API
  - id: boltic-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier with dedicated infrastructure and priority support.
    entries:
      - label: Workflow executions
        name: workflow_executions
        type: quota
        metric: execution
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: Team members
        name: team_members
        type: quota
        metric: seat
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: Storage
        name: storage
        type: quota
        metric: gb
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
