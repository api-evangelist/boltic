specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Boltic
providerId: boltic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Automation
  - DataSync
  - Gateways
  - NoCode
  - Streaming
  - Workflows
description: Boltic prices its AI workflow automation platform using subscription tiers metered primarily
  by monthly workflow executions, with team seats and storage attached. Tiers ladder from a 30-day Free
  trial through Growth and Business, capped by a custom-priced Enterprise plan. Add-on credits for premium
  AI integrations are sold separately at $1.25 per credit.
sources:
  - https://www.boltic.io/pricing
plans:
  - id: boltic-free
    name: Free
    type: freemium
    description: 30-day free trial with no credit card required.
    entries:
      - label: Workflow executions
        name: workflow_executions
        type: quota
        metric: execution
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Team members
        name: team_members
        type: quota
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Storage
        name: storage
        type: quota
        metric: gb
        limit: 0.5
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Email Support
      - name: Boltic Gateway API
      - name: Boltic Workflow API
      - name: Boltic Tables API
      - name: Boltic Pipes API
      - name: Boltic Streams API
  - id: boltic-growth
    name: Growth
    type: subscription
    description: Entry paid tier billed monthly or annually.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $39/month
        userMultiplied: false
      - label: Subscription (annual billing)
        name: subscription_annual
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $33/month
        userMultiplied: false
      - label: Workflow executions
        name: workflow_executions
        type: quota
        metric: execution
        limit: 3000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Team members
        name: team_members
        type: quota
        metric: seat
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Storage
        name: storage
        type: quota
        metric: gb
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Email & Chat Support
      - name: Custom Connectors
      - name: Boltic Gateway API
      - name: Boltic Workflow API
      - name: Boltic Tables API
      - name: Boltic Pipes API
      - name: Boltic Streams API
  - id: boltic-business
    name: Business
    type: subscription
    description: Most-popular tier for teams running production automations.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $199/month
        userMultiplied: false
      - label: Subscription (annual billing)
        name: subscription_annual
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $179/month
        userMultiplied: false
      - label: Workflow executions
        name: workflow_executions
        type: quota
        metric: execution
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Team members
        name: team_members
        type: quota
        metric: seat
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Storage
