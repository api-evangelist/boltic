      - name: Boltic Gateway API
      - name: Boltic Workflow API
      - name: Boltic Tables API
      - name: Boltic Pipes API
      - name: Boltic Streams API
  - id: boltic-credits
    name: Credits Add-On
    type: usage-based
    description: Pay-as-you-go credits for premium AI model access and advanced integrations, available
      across all paid plans.
    entries:
      - label: Credit
        name: credit
        type: metered
        metric: credit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $1.25
        userMultiplied: false
    elements:
      - name: Premium AI Model Access
      - name: Advanced Integrations
