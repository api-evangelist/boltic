specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Boltic
providerId: boltic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automation
  - DataSync
  - Gateways
  - NoCode
  - Streaming
  - Workflows
  - Rate Limiting
description: Boltic does not publish per-second or per-minute API rate limits in its public documentation
  or pricing page. The principal published quota is the monthly workflow execution allowance per plan
  tier. Consumers should treat the per-tier execution count as the binding constraint and apply standard
  exponential backoff on any 429 or 503 responses.
sources:
  - https://www.boltic.io/pricing
  - https://docs.boltic.io/
notes: Boltic does not publish HTTP-level rate-limit numbers; documented quotas are monthly workflow executions
  bound to subscription tier. Reconcile with provider once per-second / burst limits are published.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Free plan workflow executions
    scope: account
    metric: workflow_executions_per_month
    limit: 1000
    timeFrame: month
    notes: Plan quota, not request rate. 30-day trial.
  - name: Growth plan workflow executions
    scope: account
    metric: workflow_executions_per_month
    limit: 3000
    timeFrame: month
  - name: Business plan workflow executions
    scope: account
    metric: workflow_executions_per_month
    limit: 10000
    timeFrame: month
  - name: Enterprise plan workflow executions
    scope: account
    metric: workflow_executions_per_month
    limit: 'custom'
    notes: Negotiated capacity.
  - name: HTTP request rate
    scope: api-key
    metric: varies
    limit: 'see provider documentation'
    notes: Per-second / per-minute HTTP rate limits not publicly documented.
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 and 503 responses; honor any Retry-After
      header when present.
  - name: Quota Reset
    description: Workflow execution quotas reset on a calendar-month basis aligned with the billing cycle.
  - name: Tier-Bound Quotas
    description: Execution capacity scales with the subscription tier (Free, Growth, Business, Enterprise);
      sustained overage requires upgrade or Enterprise contract.
  - name: Fair Use
    description: Even on Enterprise tiers, sustained traffic that materially affects shared infrastructure
      may be subject to fair-use review.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
