naftiko: 1.0.0-alpha2
info:
  label: Boltic Streams API — Events
  description: 'Boltic Streams API — Events. 2 operations. Lead operation: Boltic Send an event. Self-contained Naftiko capability
    covering one Boltic business surface.'
  tags:
  - Boltic
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOLTIC_API_KEY: BOLTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: streams-events
    baseUri: https://api.boltic.io/v1
    description: Boltic Streams API — Events business capability. Self-contained, no shared references.
    resources:
    - name: streams-events
      path: /streams/events
      operations:
      - name: sendevent
        method: POST
        description: Boltic Send an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: queryevents
        method: GET
        description: Boltic Query events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sourceId
          in: query
          type: string
        - name: eventType
          in: query
          type: string
        - name: from
          in: query
          type: string
        - name: to
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.BOLTIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: streams-events-rest
    port: 8080
    description: REST adapter for Boltic Streams API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/streams/events
      name: streams-events
      description: REST surface for streams-events.
      operations:
      - method: POST
        name: sendevent
        description: Boltic Send an event
        call: streams-events.sendevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: queryevents
        description: Boltic Query events
        call: streams-events.queryevents
        with:
          sourceId: rest.sourceId
          eventType: rest.eventType
          from: rest.from
          to: rest.to
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streams-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boltic Streams API — Events. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: boltic-send-event
      description: Boltic Send an event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: streams-events.sendevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-query-events
      description: Boltic Query events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streams-events.queryevents
      with:
        sourceId: tools.sourceId
        eventType: tools.eventType
        from: tools.from
        to: tools.to
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
