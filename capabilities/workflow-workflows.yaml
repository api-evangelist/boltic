naftiko: 1.0.0-alpha2
info:
  label: Boltic Workflow API — Workflows
  description: 'Boltic Workflow API — Workflows. 8 operations. Lead operation: Boltic List all workflows. Self-contained Naftiko
    capability covering one Boltic business surface.'
  tags:
  - Boltic
  - Workflows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOLTIC_API_KEY: BOLTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: workflow-workflows
    baseUri: https://api.boltic.io/v1
    description: Boltic Workflow API — Workflows business capability. Self-contained, no shared references.
    resources:
    - name: workflows
      path: /workflows
      operations:
      - name: listworkflows
        method: GET
        description: Boltic List all workflows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: status
          in: query
          type: string
      - name: createworkflow
        method: POST
        description: Boltic Create a new workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workflows-workflowId
      path: /workflows/{workflowId}
      operations:
      - name: getworkflow
        method: GET
        description: Boltic Get a workflow by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
      - name: updateworkflow
        method: PUT
        description: Boltic Update a workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteworkflow
        method: DELETE
        description: Boltic Delete a workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
    - name: workflows-workflowId-activate
      path: /workflows/{workflowId}/activate
      operations:
      - name: activateworkflow
        method: POST
        description: Boltic Activate a workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
    - name: workflows-workflowId-deactivate
      path: /workflows/{workflowId}/deactivate
      operations:
      - name: deactivateworkflow
        method: POST
        description: Boltic Deactivate a workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
    - name: workflows-workflowId-execute
      path: /workflows/{workflowId}/execute
      operations:
      - name: executeworkflow
        method: POST
        description: Boltic Execute a workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.BOLTIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: workflow-workflows-rest
    port: 8080
    description: REST adapter for Boltic Workflow API — Workflows. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/workflows
      name: workflows
      description: REST surface for workflows.
      operations:
      - method: GET
        name: listworkflows
        description: Boltic List all workflows
        call: workflow-workflows.listworkflows
        with:
          page: rest.page
          limit: rest.limit
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createworkflow
        description: Boltic Create a new workflow
        call: workflow-workflows.createworkflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/{workflowid}
      name: workflows-workflowid
      description: REST surface for workflows-workflowId.
      operations:
      - method: GET
        name: getworkflow
        description: Boltic Get a workflow by ID
        call: workflow-workflows.getworkflow
        with:
          workflowId: rest.workflowId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateworkflow
        description: Boltic Update a workflow
        call: workflow-workflows.updateworkflow
        with:
          workflowId: rest.workflowId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteworkflow
        description: Boltic Delete a workflow
        call: workflow-workflows.deleteworkflow
        with:
          workflowId: rest.workflowId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/{workflowid}/activate
      name: workflows-workflowid-activate
      description: REST surface for workflows-workflowId-activate.
      operations:
      - method: POST
        name: activateworkflow
        description: Boltic Activate a workflow
        call: workflow-workflows.activateworkflow
        with:
          workflowId: rest.workflowId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/{workflowid}/deactivate
      name: workflows-workflowid-deactivate
      description: REST surface for workflows-workflowId-deactivate.
      operations:
      - method: POST
        name: deactivateworkflow
        description: Boltic Deactivate a workflow
        call: workflow-workflows.deactivateworkflow
        with:
          workflowId: rest.workflowId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/{workflowid}/execute
      name: workflows-workflowid-execute
      description: REST surface for workflows-workflowId-execute.
      operations:
      - method: POST
        name: executeworkflow
        description: Boltic Execute a workflow
        call: workflow-workflows.executeworkflow
        with:
          workflowId: rest.workflowId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: workflow-workflows-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boltic Workflow API — Workflows. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: boltic-list-all-workflows
      description: Boltic List all workflows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workflow-workflows.listworkflows
      with:
        page: tools.page
        limit: tools.limit
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-create-new-workflow
      description: Boltic Create a new workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow-workflows.createworkflow
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-get-workflow-id
      description: Boltic Get a workflow by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workflow-workflows.getworkflow
      with:
        workflowId: tools.workflowId
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-update-workflow
      description: Boltic Update a workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: workflow-workflows.updateworkflow
      with:
        workflowId: tools.workflowId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-delete-workflow
      description: Boltic Delete a workflow
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: workflow-workflows.deleteworkflow
      with:
        workflowId: tools.workflowId
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-activate-workflow
      description: Boltic Activate a workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow-workflows.activateworkflow
      with:
        workflowId: tools.workflowId
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-deactivate-workflow
      description: Boltic Deactivate a workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow-workflows.deactivateworkflow
      with:
        workflowId: tools.workflowId
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-execute-workflow
      description: Boltic Execute a workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow-workflows.executeworkflow
      with:
        workflowId: tools.workflowId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
