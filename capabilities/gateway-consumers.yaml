naftiko: 1.0.0-alpha2
info:
  label: Boltic Gateway API — Consumers
  description: 'Boltic Gateway API — Consumers. 4 operations. Lead operation: Boltic List all consumers. Self-contained Naftiko
    capability covering one Boltic business surface.'
  tags:
  - Boltic
  - Consumers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOLTIC_API_KEY: BOLTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-consumers
    baseUri: https://gateway.boltic.io/v1
    description: Boltic Gateway API — Consumers business capability. Self-contained, no shared references.
    resources:
    - name: consumers
      path: /consumers
      operations:
      - name: listconsumers
        method: GET
        description: Boltic List all consumers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createconsumer
        method: POST
        description: Boltic Create a new consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: consumers-consumerId
      path: /consumers/{consumerId}
      operations:
      - name: getconsumer
        method: GET
        description: Boltic Get a consumer by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consumerId
          in: path
          type: string
          required: true
      - name: deleteconsumer
        method: DELETE
        description: Boltic Delete a consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consumerId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.BOLTIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: gateway-consumers-rest
    port: 8080
    description: REST adapter for Boltic Gateway API — Consumers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/consumers
      name: consumers
      description: REST surface for consumers.
      operations:
      - method: GET
        name: listconsumers
        description: Boltic List all consumers
        call: gateway-consumers.listconsumers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createconsumer
        description: Boltic Create a new consumer
        call: gateway-consumers.createconsumer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/consumers/{consumerid}
      name: consumers-consumerid
      description: REST surface for consumers-consumerId.
      operations:
      - method: GET
        name: getconsumer
        description: Boltic Get a consumer by ID
        call: gateway-consumers.getconsumer
        with:
          consumerId: rest.consumerId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteconsumer
        description: Boltic Delete a consumer
        call: gateway-consumers.deleteconsumer
        with:
          consumerId: rest.consumerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gateway-consumers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boltic Gateway API — Consumers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: boltic-list-all-consumers
      description: Boltic List all consumers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-consumers.listconsumers
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-create-new-consumer
      description: Boltic Create a new consumer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-consumers.createconsumer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-get-consumer-id
      description: Boltic Get a consumer by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-consumers.getconsumer
      with:
        consumerId: tools.consumerId
      outputParameters:
      - type: object
        mapping: $.
    - name: boltic-delete-consumer
      description: Boltic Delete a consumer
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gateway-consumers.deleteconsumer
      with:
        consumerId: tools.consumerId
      outputParameters:
      - type: object
        mapping: $.
