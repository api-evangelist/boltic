specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Boltic
providerId: boltic
publisherName: Boltic
serviceCategory: Workflow Automation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Automation
  - DataSync
  - Gateways
  - NoCode
  - Streaming
  - Workflows
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Boltic: tiered subscription with execution / seat / storage quotas
  per plan, plus pay-as-you-go credits at $1.25 per credit for premium AI integrations.'
sources:
  - https://www.boltic.io/pricing
  - https://docs.boltic.io/
billingModel:
  pricingCategory: Tiered Subscription + Credits
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Boltic
  ServiceCategory: Workflow Automation
  ProviderName: Boltic
  PublisherName: Boltic
  InvoiceIssuerName: Boltic
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: subscription-month
meters:
  - name: subscription_month
    description: Plan subscription fee billed monthly per account.
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - billing_cycle
  - name: workflow_executions
    description: Count of workflow runs charged against the plan's monthly execution allowance.
    unit: execution
    aggregation: sum
    dimensions:
      - workflow
      - plan
      - environment
  - name: seats
    description: Number of provisioned team members on the account.
    unit: seat
    aggregation: max
    dimensions:
      - plan
      - role
  - name: storage
    description: Provisioned storage attached to the account.
    unit: GB-month
    aggregation: max
    dimensions:
      - plan
  - name: ai_credits
    description: Pay-as-you-go credits consumed for premium AI integrations and advanced models.
    unit: credit
    aggregation: sum
    dimensions:
      - integration
      - model
principles:
  - name: Visibility
    description: Track workflow execution counts, seat usage, and credit consumption from the Boltic console;
      monitor monthly execution headroom to avoid plan overage.
  - name: Allocation
    description: Tag workflows with the consuming team / business function and split credit consumption
      by integration and AI model so spend can be attributed.
  - name: Optimization
    description: Right-size the subscription tier to the actual monthly execution profile, consolidate
      duplicate workflows, prefer batch and webhook-triggered patterns over polling, and reserve credits
      for high-value AI calls.
  - name: Accountability
    description: Designate a workflow owner per business function; review monthly execution and credit
      burn against budget and renegotiate Enterprise capacity at renewal.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
